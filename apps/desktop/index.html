<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>公积金 OCR 工具</title>
    <style>
      /* 确保 html 和 body 占满整个窗口 */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      /* Tauri WebView2 + PER_MONITOR_AWARE_V2 下，CSS 像素自动按 DPI 缩放。
         不需要任何 transform/zoom，否则会双重缩放导致布局溢出 */
    </style>
</head>
<body class="select-none antialiased bg-[#F8FAFC] text-[#0F172A]">
    <div id="root" class="flex flex-col h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
