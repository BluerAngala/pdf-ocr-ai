<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公积金 OCR 工具</title>
    <style>
      /* 确保 html 和 body 占满整个窗口 */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      /* Tauri WebView 高分屏适配 */
      @media (resolution > 1dppx) {
        html {
          /* 使用 transform 替代 zoom，避免 viewport 计算问题 */
          transform-origin: 0 0;
        }
      }
    </style>
</head>
<body class="select-none antialiased bg-[#F8FAFC] text-[#0F172A]">
    <div id="root" class="flex flex-col h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
