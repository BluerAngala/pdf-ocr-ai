version: "1.0.0"
developer: "陈恒律师"
paths:
  directories:
    result_dirname: "non-litigation-results"
    temp_dirname: "non-litigation"
    input_dirname: "non-litigation"
  files:
    excel_filename: "台账及命名规则.xlsx"
    standard_output_dirname: "对应输出文件（标准版）"
    audit_log_filename: "audit-log.json"
  standard_output_subdirs:
    责催: "输出文件（责催）"
    申请书: "输出文件（申请书）"
    授权书: "输出文件（授权书）"
    所函: "输出文件（所函）"

doc_types:
  - key: "责催"
    source_pdf: null
    output_dir: "输出文件（责催）"
    pages_per_case: null
    boundary_keywords: []
    validation_keywords: []
    filename_pattern: "{sequence}-责催-{notice_number}.pdf"
    is_notice: true
  - key: "申请书"
    source_pdf: "申请书.pdf"
    output_dir: "输出文件（申请书）"
    pages_per_case: 2
    boundary_keywords:
      - "强制执行申请书"
      - "申请执行书"
      - "强制执行申请"
    validation_keywords:
      - "强制执行申请书"
      - "名称"
    filename_pattern: "{sequence}-申请书pdf-{notice_number}.pdf"
    is_notice: false
  - key: "授权书"
    source_pdf: "授权书.pdf"
    output_dir: "输出文件（授权书）"
    pages_per_case: 1
    boundary_keywords: []
    validation_keywords:
      - "授权委托书"
    filename_pattern: "{company_name}.pdf"
    content_marker: "授权委托书"
    is_notice: false
  - key: "所函"
    source_pdf: "所函.pdf"
    output_dir: "输出文件（所函）"
    pages_per_case: 1
    boundary_keywords: []
    validation_keywords:
      - "律师事务所函"
    filename_pattern: "{company_name}.pdf"
    content_marker: "律师事务所函"
    is_notice: false

excel_parsing:
  min_columns: 5
  column_original_notice: 1
  column_renamed_notice: 2
  column_company_name: 4
  filter_keywords:
    original_notice: "责字"
    renamed_notice: "责催-"

regex_patterns:
  notice_number: '穗公积金中心[^\s，。；《》]*?责字[〔\[(［【]\d{4}[〕\)\]］】]\d+(?:-\d+)?号'
  court_case_number: '[(\[]\s*(\d{4})\s*[)\]]\s*(粤|穗)\s*(\d+)\s*(行审|民初|刑初|执|行)\s*(\d+)\s*号'
  decision_case_number: '(.{2,30}?字)\s*[\[(]\s*(\d{4})\s*[\])]\s*(\d+(?:-\d+)?)\s*号'
  decision_id_types: "责字|行审|民初|刑初|执字"
  decision_number_range: '(穗公积金中心[^\s，。；《》]*?责字〔\d{4}〕)(\d+(?:-\d+)?)号至\s*(\d+(?:-\d+)?)号'
  single_decision_number: '(穗公积金中心[^\s，。；《》]*?责字〔\d{4}〕\d+(?:-\d+)?号)'

ocr_corrections:
  non_litigation:
    - wrong: "住房公积全"
      correct: "住房公积金"
    - wrong: "住方公积金"
      correct: "住房公积金"
    - wrong: "公积全"
      correct: "公积金"
    - wrong: "公基金"
      correct: "公积金"
    - wrong: "授权委拖书"
      correct: "授权委托书"
    - wrong: "授校委托书"
      correct: "授权委托书"
    - wrong: "责行"
      correct: "责令"
    - wrong: "责字令"
      correct: "责令"
    - wrong: "强制申请书"
      correct: "强制执行申请书"
    - wrong: "岭南律师所"
      correct: "岭南律师事务所"
    - wrong: "岭南律师"
      correct: "岭南律师事务所"
    - wrong: "越秀责字"
      correct: "越秀责字"
    - wrong: "穗公积金中心"
      correct: "穗公积金中心"
    - wrong: "责字〔"
      correct: "责字〔"
    - wrong: "责字【"
      correct: "责字〔"
    - wrong: "责字["
      correct: "责字〔"
    - wrong: "责字（"
      correct: "责字〔"
    - wrong: "〕\\d"
      correct: "〕\\d"
    - wrong: "】\\d"
      correct: "〕\\d"
    - wrong: "]\\d"
      correct: "〕\\d"
    - wrong: "）\\d"
      correct: "〕\\d"
    - wrong: "统一社会信用代码"
      correct: "统一社会信用代码"
    - wrong: "统一社会信用代玛"
      correct: "统一社会信用代码"
    - wrong: "社会信用代码"
      correct: "社会信用代码"
    - wrong: "信用代码"
      correct: "信用代码"
    - wrong: "有限责公司"
      correct: "有限责任公司"
    - wrong: "有限公词"
      correct: "有限公司"
    - wrong: "股份有限公词"
      correct: "股份有限公司"
    - wrong: "有限公可"
      correct: "有限公司"
    - wrong: "有限公司"
      correct: "有限公司"
  company_name_corrections:
    - pattern: '广东\\s*润生\\s*箱包\\s*制造\\s*有限公司'
      replacement: "广东润生箱包制造有限公司"
    - pattern: '三菱\\s*电机\\s*[(（]\\s*广州\\s*[)）]\\s*压缩机\\s*有限公司'
      replacement: "三菱电机（广州）压缩机有限公司"
    - pattern: '广州\\s*住房\\s*公积金\\s*管理\\s*中心'
      replacement: "广州住房公积金管理中心"
    - pattern: '广东\\s*省\\s*新闻\\s*工作\\s*者\\s*协会'
      replacement: "广东省新闻工作者协会"
    - pattern: '广东\\s*岭南\\s*律师\\s*事务所'
      replacement: "广东岭南律师事务所"

validation:
  fuzzy_match_threshold: 0.85
  text_quality:
    notice:
      good: 100
      fair: 50
    application:
      good: 500
      fair: 200
    company_doc:
      good: 100
      fair: 50

ocr:
  engine:
    dpi: 150
    max_image_size: 600
    parallel_workers: 4
    small_pdf_page_threshold: 6
  optimization:
    enable_region_first: true
    allow_full_page_fallback: true
    region_dpi: 150
    region_max_image_size: 600
    notice_scan_window_pages: 4
    notice_scan_max_pages: 10
    notice_region_fallback_min_text_length: 8
    application_region_fallback_min_text_length: 5
    company_doc_region_fallback_min_text_length: 6
    skip_blank_pages: true
    blank_page_threshold: 0.02
    doc_regions:
      责催:
        - notice_header
      申请书:
        - application_title
      授权书:
        - company_top
        - company_middle
      所函:
        - application_title
  parallelism:
    auto_detect_resources: true
    max_parallel_workers: 8
    memory_reserve_gb: 1.5

text_processing:
  company_keywords:
    - "有限责任公司"
    - "股份有限公司"
    - "集团有限公司"
    - "有限公司"
    - "集团公司"
    - "股份公司"
    - "事务所"
    - "管理中心"
    - "研究院"
    - "协会"
    - "中心"
    - "公司"
  document_types:
    - "行政裁定书"
    - "责令限期办理决定书"
    - "催告书"
    - "授权委托书"
    - "合作协议"
    - "合同"
  noise_prefixes:
    - "准予强制执行"
    - "附："
    - "附件："
  decision_number_range_max_spread: 20

mock_ocr:
  noise_samples:
    - "责行"
    - "公积全"
    - "授校委托书"
    - "住方公积金"

# ============================================
# 强制执行组配置
# ============================================
enforcement:
  paths:
    input_dirname: "提取信息"
    output_dirname: "enforcement-results"
    excel_filename: "非诉表格.xlsx"
    excel_output_filename: "执行组识别结果.xlsx"
    json_output_filename: "enforcement_extracted.json"
  
  excel_parsing:
    min_columns: 3
    # 列索引映射（0-based）
    columns:
      region: 0              # 区域
      notice_number: 1       # 责令号
      respondent: 2          # 被执行人
      employee: 3            # 职工
      amount: 4              # 金额
      due_date: 5            # 到期日
      case_number: 12        # 受理案号（需要填充）
      judge: 13              # 法官/助理/书记员（需要填充）
      ruling_result: 15      # 裁定结果/收到时间（需要填充）
    filter_keywords:
      notice_number: "责字"
  
  # 裁定PDF信息提取规则
  extraction:
    # 执行标的金额提取正则（在去除CJK间距后的文本上匹配）
    amount_patterns:
      - '住房公积金(\d[\d,]*)\s*元'
      - '公积金(\d[\d,]*)\s*元'
      - '部分住房公积金(\d[\d,]*)\s*元'
      - '执行标的[为]?\s*(\d[\d,]*)\s*元'
      - '(?:金额|款项|本金|欠款)[：:]\s*(\d[\d,]*)\s*元'
      - '(\d{4,})\s*元'
    
    # 裁定日期提取正则（在去除CJK间距后的文本上匹配）
    date_patterns:
      - '(二[〇○零][一二三四五六七八九十〇]{2,4}年[一二三四五六七八九十〇]{1,2}月[一二三四五六七八九十〇]{1,3}日)'
      - '(\d{4}年\d{1,2}月\d{1,2}日)'
      - '(\d{4}-\d{1,2}-\d{1,2})'
      - '(\d{4}/\d{1,2}/\d{1,2})'
      - '(\d{4}年[一二三四五六七八九十〇]{1,2}月[一二三四五六七八九十〇]{1,3}日)'
    
    # 审判员提取正则（在去除CJK间距后的文本上匹配，仅捕获中文姓名2-3字）
    judge_patterns:
      - '审判员([\u4e00-\u9fff]{2,3})'
    
    # 书记员提取正则（在去除CJK间距后的文本上匹配，仅捕获中文姓名）
    clerk_patterns:
      - '书记员([\u4e00-\u9fff]{2,4})'
    
    # 申请执行人提取正则
    applicant_patterns:
      - '申请执行人[：:]\s*([^，。,，、\n]+?)[，。,，、\n]'
    
    # 被执行人提取正则
    respondent_patterns:
      - '被执行人[：:]\s*([^，。,，、\n]+?)[，。,，、\n]'
    
    # 法院案号提取正则（在去除CJK间距后的文本上匹配）
    court_case_pattern: '[（(]\d{4}[）)]粤\d+行审\d+号'
    
    # 责令号提取正则（在去除CJK间距后的文本上匹配，匹配完整责令号）
    notice_number_in_ruling_pattern: '穗公积金中心\S*?责字[〔\[(［【]\d{4}[〕\)\]］】]\d+号'
    
    # 责令号范围提取（处理"3360号至3361号"类格式）
    notice_number_range_pattern: '责字[〔\[(［【](\d{4})[〕\)\]］】](\d+)号至(\d+)号'
    
    # 撤回执行检测关键词
    withdraw_keywords:
      - '撤回执行'
      - '撤回强制执行'
      - '不准予强制执行'
      - '不予执行'
  
  # OCR纠错（强制执行组特有）
  ocr_corrections:
    - wrong: "审判員"
      correct: "审判员"
    - wrong: "书记員"
      correct: "书记员"
    - wrong: "申清执行人"
      correct: "申请执行人"
    - wrong: "被执行入"
      correct: "被执行人"
    - wrong: "二O二"
      correct: "二〇二"
    - wrong: "二零二"
      correct: "二〇二"

