  decision_id_types: 责字|行审|民初|刑初|执字
  decision_number_range: (穗公积金中心[^\s，。；《》]*?责字〔\d{4}〕)(\d+(?:-\d+)?)号至\s*(\d+(?:-\d+)?)号
  single_decision_number: (穗公积金中心[^\s，。；《》]*?责字〔\d{4}〕\d+(?:-\d+)?号)
