name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create Python venv and install dependencies
        shell: pwsh
        run: |
          python -m venv .venv312
          . .venv312\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install -r apps/server/requirements.txt
          pip install pyinstaller
          echo "Python packages installed:"
          pip list

      - name: Verify PyInstaller spec exists
        shell: pwsh
        run: |
          if (-not (Test-Path apps/server/gjj-ocr-server.spec)) {
            Write-Error "PyInstaller spec not found!"
            exit 1
          }
          echo "Spec file found."

      - name: Prepare sample data for build
        shell: pwsh
        run: |
          # build.rs 需要 样本材料/ 下的企业信息查询，如果不存在则从 resources/sample-data/ 复制
          if (-not (Test-Path "样本材料/企业信息查询")) {
            echo "Creating 样本材料/企业信息 query from resources/sample-data/"
            New-Item -ItemType Directory -Force -Path "样本材料/企业信息查询"
            Copy-Item "resources/sample-data/company-query/001.xlsx" "样本材料/企业信息查询/001.xlsx"
          }
          echo "Sample data ready."

      - name: Install Node dependencies
        run: |
          cd apps/desktop
          npm ci

      - name: Lint check
        run: |
          cd apps/desktop
          npm run lint

      - name: TypeScript check
        run: |
          cd apps/desktop
          npx tsc --noEmit

      - name: Build frontend
        run: |
          cd apps/desktop
          npm run build

      - name: Build Tauri app
        shell: pwsh
        run: |
          . ${{ github.workspace }}\.venv312\Scripts\Activate.ps1
          cd apps/desktop
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          GJJ_FORCE_SERVER_BUNDLE: "1"
          GJJ_SKIP_VERIFY: "1"

      - name: Find installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem apps/desktop/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          $sig = Get-ChildItem apps/desktop/src-tauri/target/release/bundle/nsis/*.sig -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if (-not $exe) {
            Write-Error "No .exe found!"
            exit 1
          }
          
          echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV
          echo "Found installer: $($exe.Name)"
          
          if ($sig) {
            echo "SIG_PATH=$($sig.FullName)" >> $env:GITHUB_ENV
            echo "Found signature: $($sig.Name)"
          } else {
            Write-Warning "No .sig file found - will use empty signature"
          }

      - name: Read signature or create placeholder
        shell: pwsh
        run: |
          if ($env:SIG_PATH -and (Test-Path $env:SIG_PATH)) {
            $sigContent = Get-Content $env:SIG_PATH -Raw
            $sigContent = $sigContent.Trim()
            echo "SIGNATURE=$sigContent" >> $env:GITHUB_ENV
            echo "Signature length: $($sigContent.Length)"
          } else {
            echo "SIGNATURE=dummy-signature" >> $env:GITHUB_ENV
            echo "Using placeholder signature"
          }

      - name: Create version.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Replace("v", "")
          $date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $repo = "${{ github.repository }}"
          
          $json = @{
            version = $version
            notes = "Release ${{ github.ref_name }}"
            pub_date = $date
            platforms = @{
              windows-x86_64 = @{
                signature = $env:SIGNATURE
                url = "https://github.com/$repo/releases/latest/download/GJJ-OCR-Tool-latest-setup.exe"
              }
            }
          } | ConvertTo-Json -Depth 10
          
          $json | Out-File -FilePath version.json -Encoding utf8
          echo "Created version.json:"
          Get-Content version.json

      - name: Rename installer to fixed name
        shell: pwsh
        run: |
          Copy-Item "$env:EXE_PATH" "GJJ-OCR-Tool-latest-setup.exe"
          echo "Renamed installer to GJJ-OCR-Tool-latest-setup.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            GJJ-OCR-Tool-latest-setup.exe
            version.json
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
